version: "3.8"

services:
  aitagent:
    build: .
    container_name: aitagent
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317" # OTLP gRPC
    restart: unless-stopped
